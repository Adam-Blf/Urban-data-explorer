name: Pipeline daily
on:
  schedule: [{ cron: "0 3 * * *" }]
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r pipeline/requirements.txt
      - run: python -m pipeline.run
